name: notidialca
description: "Notidialca -  Gateway telefonico Android via red local (SMS + Llamadas)"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.1.1
  go_router: ^14.6.3
  freezed_annotation: ^2.4.4
  json_annotation: 4.9.0
  uuid: ^4.5.1
  logger: ^2.5.0 
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  cupertino_icons: ^1.0.8
  network_info_plus: ^6.1.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  device_info_plus: ^11.3.3
  flutter_contacts: ^2.1.0
  google_fonts: ^8.1.0
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dialcalink_app_icon.png"